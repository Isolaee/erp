services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      TEST_RUNNER_URL: http://test-runner:4000
      BACKEND_URL: http://backend:3001
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-this-in-production-16}
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    command: sh -c "npm install && npx prisma db push && npx prisma db seed && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

  test-runner:
    build:
      context: ./test-runner
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      # Must match backend's INTERNAL_SECRET
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-this-in-production-16}
    ports:
      - "4000:4000"
    # test-runner needs internet access to clone repos (no docker socket needed)
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_modules:
  frontend_modules:
