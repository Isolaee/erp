services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
      REDIS_URL: redis://redis:6379
      TEST_RUNNER_URL: http://test-runner:4000
      BACKEND_URL: http://backend:3001
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-this-in-production-16}
    env_file:
      - ./.env
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    command: >
      sh -c "npm install --silent &&
             npm run build &&
             npx prisma db push --accept-data-loss &&
             npx prisma db seed || echo '[seed] already seeded, skipping' &&
             npm start"
    restart: unless-stopped

  email-backend:
    build:
      context: ./email-backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      EMAIL_DB_URL: sqlite+aiosqlite:////data/email_agent.db
      FRONTEND_DIST: /frontend-dist
    ports:
      - "8000:8000"
    volumes:
      - ./email-backend:/app
      - email_db:/data
      - ./frontend/dist:/frontend-dist:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
      VITE_EMAIL_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    restart: unless-stopped

  test-runner:
    profiles: [dev]
    build:
      context: ./test-runner
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-this-in-production-16}
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_modules:
  frontend_modules:
  email_db:
