services:
  github-runner:
    image: myoung34/github-runner:latest
    restart: unless-stopped

    # host network is required so that `localhost` inside the runner resolves
    # to the Docker host — the same host where GitHub Actions service containers
    # (postgres:5432, redis:6379) bind their ports during a job run.
    network_mode: host

    environment:
      REPO_URL: https://github.com/Isolaee/erp
      ACCESS_TOKEN: ${GH_RUNNER_TOKEN}   # see .env.runner
      RUNNER_NAME: ${RUNNER_NAME:-local-docker-runner}
      RUNNER_WORKDIR: /tmp/runner
      LABELS: self-hosted,linux,docker
      EPHEMERAL: "false"   # keep the runner alive across multiple jobs
      DISABLE_AUTO_UPDATE: "true"

    volumes:
      # Docker socket — lets the runner start the service containers defined
      # in the workflow (postgres, redis) on the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_work:/tmp/runner

volumes:
  runner_work:
