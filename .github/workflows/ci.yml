name: CI

on:
  push:
  pull_request:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 – TypeScript type-check (no services needed, fast feedback)
  # ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: TypeScript type check
        working-directory: backend
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 – Full test suite with live PostgreSQL 16 + Redis 7 service containers
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: erp_test
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # Test-safe values — no production secrets needed for unit tests.
    # Add ANTHROPIC_API_KEY as a repository secret when integration/AI tests are added.
    env:
      DATABASE_URL: postgresql://erp:erp@localhost:5432/erp_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-at-least-16-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-16
      ANTHROPIC_API_KEY: ci-placeholder-not-used-in-unit-tests
      ADMIN_EMAIL: admin@ci.test
      ADMIN_PASSWORD: ci-admin-password
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Sync schema to test database
        working-directory: backend
        # db push --force-reset gives a clean schema on every run without
        # needing a migration history. Switch to `prisma migrate deploy` once
        # migrations are committed to the repo.
        run: npx prisma db push --force-reset

      - name: Run tests
        working-directory: backend
        # --ci: fails fast on first suite error, no interactive watch mode
        # github-actions reporter: annotates failing tests inline on the PR diff
        run: npm test -- --ci --reporters=default --reporters=github-actions

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage/
          retention-days: 14
